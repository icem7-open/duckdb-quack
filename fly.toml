# fly.toml app configuration file generated for duckdb-quack on 2026-05-21T12:03:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'duckdb-quack'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 9494
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
