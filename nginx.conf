events {}

http {
    server {
        listen 9494;

        # Health check HF : répond 200 à GET /
        location = / {
            return 200 'Quack OK';
            add_header Content-Type text/plain;
        }

        # Tout le reste (protocole Quack) → DuckDB sur 9495
        location / {
            proxy_pass http://127.0.0.1:9495;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
